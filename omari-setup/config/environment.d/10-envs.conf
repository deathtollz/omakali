# Scale (1 by default so the image is usable on non-HiDPI displays / VMs;
# niri handles per-output scaling itself via ~/.config/niri/output.kdl)
GDK_SCALE=1
QT_SCALE_FACTOR=1

# Cursor
XCURSOR_SIZE=24

# Force all apps to use the Wayland backend
GDK_BACKEND="wayland,x11,*"
QT_QPA_PLATFORM="wayland;xcb"
QT_QPA_PLATFORMTHEME=qt6ct
QT_STYLE_OVERRIDE=kvantum
SDL_VIDEODRIVER=wayland,x11
MOZ_ENABLE_WAYLAND=1
ELECTRON_OZONE_PLATFORM_HINT=wayland
OZONE_PLATFORM=wayland
CLUTTER_BACKEND=wayland

# Tell apps which compositor is running (used by xdg-desktop-portal, etc.).
XDG_CURRENT_DESKTOP=niri
XDG_SESSION_DESKTOP=niri
